version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: brand-blacklist-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: brand_blacklist
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - brand-blacklist-network

  redis:
    image: redis:7-alpine
    container_name: brand-blacklist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - brand-blacklist-network

volumes:
  mysql_data:
  redis_data:

networks:
  brand-blacklist-network:
    driver: bridge