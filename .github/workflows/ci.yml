name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect scripts
        id: scripts
        run: |
          node -e "const s=require('./package.json').scripts||{}; const o=(k)=>process.stdout.write(`${k}=${!!s[k]}\n`); o('typecheck'); o('test'); o('build'); o('test:e2e');" >> $GITHUB_OUTPUT

      - name: Typecheck
        if: ${{ steps.scripts.outputs.typecheck == 'true' }}
        run: pnpm typecheck

      - name: Test
        if: ${{ steps.scripts.outputs.test == 'true' }}
        run: pnpm test

      - name: Build
        if: ${{ steps.scripts.outputs.build == 'true' }}
        run: pnpm build

      - name: Install Playwright browsers
        if: ${{ steps.scripts.outputs['test:e2e'] == 'true' }}
        run: npx playwright install --with-deps

      - name: E2E tests
        if: ${{ steps.scripts.outputs['test:e2e'] == 'true' }}
        run: xvfb-run -a pnpm test:e2e

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect build:mac script
        id: mac_script
        run: |
          node -e "const s=require('./package.json').scripts||{}; process.stdout.write(`build_mac=${!!s['build:mac']}\n`);" >> $GITHUB_OUTPUT

      - name: Build macOS package
        if: ${{ steps.mac_script.outputs.build_mac == 'true' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm build:mac
