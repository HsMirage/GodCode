appId: com.godcode.app
copyright: Copyright © 2026 GodCode Team
productName: GodCode
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - prisma/**/*
  - node_modules/**/*
  # Explicitly include dot-directories (minimatch/glob may skip them by default)
  - node_modules/.prisma/**/*
  - package.json
  # Exclude Prisma engines from ASAR (they go to extraResources)
  - '!**/node_modules/@prisma/engines/introspection-engine*'
  - '!**/node_modules/@prisma/engines/schema-engine*'
  - '!**/node_modules/@prisma/engines/prisma-fmt*'
  - '!**/node_modules/@prisma/engines/query_engine-*'
  - '!**/node_modules/@prisma/engines/libquery_engine*'
  - '!**/node_modules/prisma/query_engine*'
  - '!**/node_modules/prisma/libquery_engine*'

extraResources:
  # Place Prisma engine binaries OUTSIDE the ASAR archive
  # Also copy the generated Prisma client folder to app.asar.unpacked so
  # `require('.prisma/client/default')` can resolve in packaged apps.
  - from: 'node_modules/.prisma'
    to: 'app.asar.unpacked/node_modules/.prisma'
    filter:
      - '**/*'
  - from: 'node_modules/.prisma/client'
    to: 'prisma-client'
    filter:
      - '**/*.node'
      - '**/*.dll.node'
      - 'schema.prisma'
      - 'index.js'
      - 'package.json'
  - from: 'node_modules/@prisma/engines'
    to: 'prisma-engines'
    filter:
      - 'query_engine*'
      - 'libquery_engine*'
      - 'schema-engine*'

asarUnpack:
  - '**/node_modules/@embedded-postgres/**/*'
  - '**/node_modules/embedded-postgres/**/*'
  - '**/node_modules/.prisma/**/*'
  - '**/node_modules/@prisma/**/*'
  - '**/*.node'
  - '**/*.dll.node'
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  icon: build/icon.ico
  signingHashAlgorithms:
    - sha256
  sign: null # Skip code signing for development builds
  signAndEditExecutable: false
  signDlls: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: dir
      arch:
        - arm64
        - x64
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  sign: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  shortcutName: GodCode
  createDesktopShortcut: always
  createStartMenuShortcut: true
  include: build/installer.nsh
publish: null # 手动更新模式：当前未配置远程发布源
