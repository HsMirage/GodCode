appId: com.codeall.app
productName: CodeAll
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - prisma/**/*
  - node_modules/**/*
  - package.json
asarUnpack:
  - '**/node_modules/@embedded-postgres/**/*'
  - '**/node_modules/embedded-postgres/**/*'
  - '**/node_modules/.prisma/client/*.node'
  - '**/*.node'
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  icon: resources/icon.ico
  signingHashAlgorithms:
    - sha256
  sign: null # Skip code signing for development builds
  signDlls: false
publish: null
